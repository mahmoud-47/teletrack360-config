server:
  port: 8080

gateway:
  service:
    key: ${GATEWAY_SERVICE_KEY:sk_gateway_default_key}

spring:
  application:
    name: api-gateway
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  cloud:
    loadbalancer:
      eager-load:
        enabled: true
        clients: incident-service,user-service,reporting-service,notification-service
      cache:
        ttl: 35s
        capacity: 256
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 35s
      discovery:
        locator:
          enabled: true
      routes:
        - id: oauth2-authorization
          uri: lb://user-service
          predicates:
            - Path=/oauth2/**
          filters:
            - AddRequestHeader=X-Gateway-Key, ${gateway.service.key}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5 # Allow 5 requests per second
                redis-rate-limiter.burstCapacity: 10 # Allow up to 10 in a single second
                key-resolver: "#{@userKeyResolver}"

        - id: oauth2-login-callback
          uri: lb://user-service
          predicates:
            - Path=/login/oauth2/**
          filters:
            - AddRequestHeader=X-Gateway-Key, ${gateway.service.key}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5 # Allow 5 requests per second
                redis-rate-limiter.burstCapacity: 10 # Allow up to 10 in a single second
                key-resolver: "#{@userKeyResolver}"

        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Gateway-Key, ${gateway.service.key}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5 # Allow 5 requests per second
                redis-rate-limiter.burstCapacity: 10 # Allow up to 10 in a single second
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback/users

        - id: user-service-users
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Gateway-Key, ${gateway.service.key}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5 # Allow 5 requests per second
                redis-rate-limiter.burstCapacity: 10 # Allow up to 10 in a single second
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback/users

        - id: user-service-admin
          uri: lb://user-service
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Gateway-Key, ${gateway.service.key}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5 # Allow 5 requests per second
                redis-rate-limiter.burstCapacity: 10 # Allow up to 10 in a single second
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback/users

        - id: user-service-swagger
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs/**
          filters:
            - RewritePath=/user-service/v3/api-docs, /v3/api-docs

        - id: incident-service
          uri: lb://incident-service
          predicates:
            - Path=/api/v1/incidents/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Gateway-Key, ${gateway.service.key}
            - name: CircuitBreaker
              args:
                name: incidentServiceCircuitBreaker
                fallbackUri: forward:/fallback/incidents

        - id: incident-service-swagger
          uri: lb://incident-service
          predicates:
            - Path=/incident-service/v3/api-docs/**
          filters:
            - RewritePath=/incident-service/v3/api-docs, /v3/api-docs

        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/api/v1/reports/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Gateway-Key, ${gateway.service.key}
            - name: CircuitBreaker
              args:
                name: reportingServiceCircuitBreaker
                fallbackUri: forward:/fallback/reporting

        - id: reporting-service-swagger
          uri: lb://reporting-service
          predicates:
            - Path=/reporting-service/v3/api-docs/**
          filters:
            - RewritePath=/reporting-service/v3/api-docs, /v3/api-docs

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Gateway-Key, ${gateway.service.key}

        - id: notification-service-swagger
          uri: lb://notification-service
          predicates:
            - Path=/notification-service/v3/api-docs/**
          filters:
            - RewritePath=/notification-service/v3/api-docs, /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 30

resilience4j:
  circuitbreaker:
    instances:
      userServiceCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 60

      incidentServiceCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 60

      reportingServiceCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 30s
        slow-call-rate-threshold: 100

  timelimiter:
    instances:
      userServiceCircuitBreaker:
        timeout-duration: 5s
      incidentServiceCircuitBreaker:
        timeout-duration: 10s
      reportingServiceCircuitBreaker:
        timeout-duration: 30s

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: /user-service/v3/api-docs
      - name: Incident Service
        url: /incident-service/v3/api-docs
      - name: Reporting Service
        url: /reporting-service/v3/api-docs
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,routes
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
    com.teletrack360: DEBUG