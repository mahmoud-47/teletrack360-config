server:
  port: 8082

service:
  api-key:
    incident-service: ${INCIDENT-SERVICE-API-KEY:sk_incident_service} # dev key

spring:
  application:
    name: incident-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  datasource:
    url: ${INCIDENT_DB_URL:jdbc:postgresql://localhost:5433/incidents_db}
    username: ${INCIDENT_DB_USERNAME:postgres}
    password: ${INCIDENT_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_THRESHOLD:60000}
  cloud:
    openfeign:
      circuitbreaker:
        enabled: ${FEIGN_CB_ENABLED:true}
        group:
          enabled: true

server:
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:10}
    accept-count: ${TOMCAT_ACCEPT_COUNT:100}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:8192}

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: ${CB_SLIDING_WINDOW_SIZE:10}
        minimum-number-of-calls: ${CB_MIN_CALLS:5}
        failure-rate-threshold: ${CB_FAILURE_RATE_THRESHOLD:50}
        wait-duration-in-open-state: ${CB_WAIT_DURATION_OPEN_STATE:60s}
        permitted-number-of-calls-in-half-open-state: ${CB_HALF_OPEN_PERMITTED_CALLS:3}
        slow-call-duration-threshold: ${CB_SLOW_CALL_DURATION_THRESHOLD:2s}
        slow-call-rate-threshold: ${CB_SLOW_CALL_RATE_THRESHOLD:100}


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
